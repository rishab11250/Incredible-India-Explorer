<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Master Chef India Challenge. Cook iconic dishes from across India!">
    <title>Culinary Challenge | Incredible India</title>
    <link rel="icon" href="data:,">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="culinary-game.css">
</head>

<body class="challenge-body">
    <header class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="../../index.html#home" class="nav-logo" id="nav-logo">
                <span class="saffron">Incredible</span>
                <span class="gold">India</span>
                <span class="green">Explorer</span>
            </a>

            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-menu" id="nav-menu">
                <a href="../../index.html#home" class="nav-link" id="link-home">Home</a>
                <a href="../../index.html#map" class="nav-link" id="link-map">Interactive Map</a>
                <a href="../../frontend/cuisine/cuisine.html" class="nav-link" id="link-cuisine">Cuisine</a>
                <a href="culinary-game.html" class="nav-link active" style="color: #f59e0b">Culinary Challenge</a>

                <div class="nav-dropdown">
                    <button class="nav-link dropdown-toggle" id="link-explore-more">
                        Explore More ▾
                    </button>
                    <div class="dropdown-menu">
                        <a href="../../frontend/passport-quest/passport-quest.html" class="dropdown-item">Passport Quest</a>
                        <a href="../../frontend/monsoon-game/monsoon-game.html" class="dropdown-item">Monsoon Game</a>
                        <a href="../../frontend/wildlife-rescue/wildlife-rescue.html" class="dropdown-item">Wildlife Rescue</a>
                        <a href="../../frontend/river-game/river-game.html" class="dropdown-item">River Explorer</a>
                    </div>
                </div>
                <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle Dark/Light Mode">☀️</button>
            </nav>
        </div>
    </header>

    <main class="kitchen-page">
        <!-- HUD -->
        <section class="hud-panel">
            <div class="stat"><span class="icon">🏆</span> Score: <strong id="ui-score">0</strong></div>
            <div class="stat"><span class="icon">🪙</span> Coins: <strong id="ui-coins">0</strong></div>
            <div class="stat"><span class="icon">✨</span> XP: <strong id="ui-xp">0</strong></div>
            <div class="stat"><span class="icon">🔥</span> Combo: <strong id="ui-multiplier" class="saffron">x1</strong></div>
        </section>

        <!-- Message Alert -->
        <div id="ui-message" class="game-message"></div>

        <section class="kitchen-workspace">
            <!-- Order Ticket -->
            <div class="order-ticket">
                <div class="ticket-header">
                    <h3>🍽️ Current Order</h3>
                    <h2 id="ui-recipe-name">Waiting...</h2>
                </div>
                <div class="timer-bar-container">
                    <div class="timer-bar" id="ui-timer-bar"></div>
                </div>
                <div class="timer-text">⏳ <span id="ui-time-text">0</span> Seconds</div>
                
                <h4 class="mt-4">Required Ingredients:</h4>
                <div class="recipe-reqs" id="ui-recipe-reqs">
                    <!-- Checkboxes and reqs injected via JS -->
                </div>
            </div>

            <!-- Pantry Grid -->
            <div class="pantry-panel">
                <h3>Ingredients Pantry (Tap to add)</h3>
                <div class="pantry-grid" id="ui-pantry">
                    <!-- Buttons injected via JS -->
                </div>
            </div>
        </section>

        <!-- Result Modal -->
        <div id="result-modal" class="modal-overlay hidden">
            <div class="modal-content text-center">
                <h2 class="saffron">Order Served!</h2>
                <p id="modal-result-msg" class="mt-4 mb-4"></p>
                <button id="btn-next-order" class="btn-primary">Next Order</button>
            </div>
        </div>

    </main>

    <script src="../../pages-common.js" defer></script>
    <script type="module" src="culinary-game.js"></script>
</body>
</html>
