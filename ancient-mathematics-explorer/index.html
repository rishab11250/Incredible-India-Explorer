<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Indian Mathematics Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ancient Indian Mathematics Explorer</h1>
            <p class="subtitle">Discover India's Rich Mathematical Heritage</p>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <div class="timeline-container">
            <div class="timeline">
                <div class="timeline-line"></div>
            </div>
        </div>

        <div class="mathematicians-container" id="mathematicians-container">
            <!-- Mathematician cards will be dynamically inserted here -->
        </div>

        <div class="detail-modal" id="detail-modal">
            <div class="modal-content">
                <button class="close-btn" id="close-modal">&times;</button>
                <div id="modal-body"></div>
            </div>
        </div>

        <footer>
            <p>Exploring the legacy of ancient Indian mathematicians who shaped the world of mathematics.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
