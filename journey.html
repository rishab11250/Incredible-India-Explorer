<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My India Journey - all the monuments, dishes, sites and stories you've bookmarked across every explorer, in one place.">
    <title>My Journey | Incredible India Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="journey.css">
</head>
<body>
    <header class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html#home" class="nav-logo">
                <span class="saffron">Incredible</span>
                <span class="gold">India</span>
                <span class="green">Explorer</span>
            </a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu" aria-expanded="false">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </button>
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html#home" class="nav-link">Home</a>
                <a href="index.html#map" class="nav-link">Interactive Map</a>
                <div class="journey-nav-search">
                    <input type="search" id="journey-search-input" class="journey-search-input" placeholder="Search all explorers…" aria-label="Search across all explorers" autocomplete="off">
                    <div id="journey-search-results" class="journey-search-results" hidden></div>
                </div>
                <a href="journey.html" class="nav-link" style="color: var(--saffron)" id="link-journey">🧭 My Journey</a>
                <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle Dark/Light Mode">☀️</button>
            </nav>
        </div>
    </header>

    <main id="app-root" class="journey-page">
        <section class="journey-hero">
            <div class="journey-hero-content">
                <span class="hero-tagline">Your India, saved</span>
                <h1>My <span class="highlight">Journey</span></h1>
                <p id="journey-progress-text">You've explored 0 of 20 regions of India!</p>
                <div class="journey-progress-track">
                    <div class="journey-progress-bar" id="journey-progress-bar" style="width:0%"></div>
                </div>
            </div>
        </section>

        <div class="journey-container">
            <div id="journey-grid" class="journey-grid"></div>
            <div id="journey-empty" class="journey-empty">
                <h3>Nothing saved yet</h3>
                <p>Tap the ♡ icon on any monument, museum, dish, or site across the explorers to save it here.</p>
            </div>
        </div>
    </main>

    <footer class="museum-footer">
        <p>Part of Incredible India Explorer &middot; <a href="index.html">Back to Home</a></p>
    </footer>

    <script src="journey.js"></script>
    <script src="router.js"></script>
</body>
</html>
